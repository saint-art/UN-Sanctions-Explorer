<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>
        {% block title %}
        UN Sanctions Explorer
        {% endblock %}
    </title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<header>

    <div class="navbar">

        <div class="logo">

            UN Sanctions Explorer

        </div>

        <nav>

            <a href="/"
               class="{% if request.path == '/' %}active{% endif %}">
                🔍 Search
            </a>

            <a href="/dashboard"
               class="{% if request.path == '/dashboard' %}active{% endif %}">
                📊 Dashboard
            </a>

            <a href="/docs"
               class="{% if request.path == '/docs' %}active{% endif %}">
                📚 API Docs
            </a>

            <a href="/health-ui"
               class="{% if request.path == '/health-ui' %}active{% endif %}">
                ❤️ Health
            </a>

        </nav>

    </div>

</header>

<main>

    <div class="container">

        {% block content %}
        {% endblock %}

    </div>

</main>

<footer>

    <p>

        <strong>UN Security Council Sanctions Explorer</strong>

    </p>

    <p>

        Flask • Python • SQLite • HTML • CSS • JavaScript

    </p>

    <p>

        Portfolio Project © 2026

    </p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="{{ url_for('static', filename='search.js') }}"></script>

</body>

</html>
